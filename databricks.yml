bundle:
  name: lakebase-features

targets:
  dev:
    default: true
    workspace:
      host: https://fevm-serverless-stable-trvrmk.cloud.databricks.com
    resources:
      apps:
        lakebase-features:
          name: lakebase-features
          source_code_path: .
          resources:
            - name: lakebase_db
              database:
                instance_name: lakebase-features
                database_name: databricks_postgres
                permission: CAN_CONNECT_AND_CREATE
