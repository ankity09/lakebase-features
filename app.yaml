command:
  - uvicorn
  - app.main:app
  - --host
  - 0.0.0.0
  - --port
  - 8000
env:
  - name: FMAPI_ENDPOINT
    value: "databricks-bge-small-en"
  - name: DELTA_CATALOG
    value: "appshield_catalog"
  - name: DELTA_SCHEMA
    value: "telemetry"
resources:
  - name: lakebase_db
    database:
      instance_name: lakebase-features
      database_name: databricks_postgres
      permission: CAN_CONNECT_AND_CREATE
